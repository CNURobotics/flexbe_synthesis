# Sample specs from Hayhurst and Conner paper in yaml format
spec_name: "vending_demo_full_spec"
specs:
    INPUT:
      - "beer_c"
      - "beer_f"
      - "pay_f"
      - "pay_c"
      - "prep_pay_c"
      - "prep_pay_f"
      - "soda_c"
      - "soda_f"
      - "select_c"
      - "select_f"

    OUTPUT:
      - "finished"
      - "failed"
      - "beer_a"
      - "pay_a"
      - "prep_pay_a"
      - "soda_a"
      - "soda_m"
      - "beer_m"
      - "select_a"

    SYS_INIT:
      - "! finished"
      - "! soda_a"
      - "! prep_pay_a"
      - "! beer_a"
      - "! pay_a"
      - "! soda_m"
      - "! beer_m"
      - "! failed"
      - "! select_a"

    ENV_INIT:
      - "! select_c"
      - "! beer_f"
      - "prep_pay_c"
      - "! pay_f"
      - "! beer_c"
      - "! pay_c"
      - "! soda_c"
      - "! soda_f"
      - "! select_f"
      - "! prep_pay_f"

    SYS_TRANS:
      - "next(prep_pay_c) -> (next(pay_a & ! soda_a & ! prep_pay_a & ! beer_a & ! select_a) | next(! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a))"
      - "next(pay_c) -> (next(select_a & ! soda_a & ! prep_pay_a & ! beer_a & ! pay_a) | next(! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a))"
      - "next(select_c) -> (next(soda_a & ! prep_pay_a & ! beer_a & ! pay_a & ! select_a) | next(beer_a & ! soda_a & ! prep_pay_a & ! pay_a & ! select_a) | next(! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a))"
      - "next(soda_c) -> next(! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)"
      - "next(beer_c) -> next(! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)"
      - "(prep_pay_a & (next(prep_pay_c) | next(prep_pay_f))) -> next(! prep_pay_a)"
      - "(pay_a & (next(pay_c) | next(pay_f))) -> next(! pay_a)"
      - "(select_a & (next(select_c) | next(select_f))) -> next(! select_a)"
      - "(soda_a & (next(soda_c) | next(soda_f))) -> next(! soda_a)"
      - "(beer_a & (next(beer_c) | next(beer_f))) -> next(! beer_a)"
      - "((soda_a & next(soda_c)) | soda_m) <-> next(soda_m)"
      - "((beer_a & next(beer_c)) | beer_m) <-> next(beer_m)"
      - "next(failed) <-> ((next(prep_pay_f) | next(pay_f) | next(select_f) | next(soda_f) | next(beer_f)) | failed)"
      - "finished -> next(finished)"

    ENV_TRANS:
      - "next(prep_pay_c) <-> (! next(pay_c) & ! next(select_c) & ! next(soda_c) & ! next(beer_c))"
      - "next(pay_c) <-> (! next(prep_pay_c) & ! next(select_c) & ! next(soda_c) & ! next(beer_c))"
      - "next(select_c) <-> (! next(prep_pay_c) & ! next(pay_c) & ! next(soda_c) & ! next(beer_c))"
      - "next(soda_c) <-> (! next(prep_pay_c) & ! next(pay_c) & ! next(select_c) & ! next(beer_c))"
      - "next(beer_c) <-> (! next(prep_pay_c) & ! next(pay_c) & ! next(select_c) & ! next(soda_c))"
      - "(prep_pay_c & (pay_a & ! soda_a & ! prep_pay_a & ! beer_a & ! select_a)) -> (next(pay_c) | next(prep_pay_c) | next(pay_f))"
      - "(pay_c & (select_a & ! soda_a & ! prep_pay_a & ! beer_a & ! pay_a)) -> (next(select_f) | next(pay_c) | next(select_c))"
      - "(select_c & (soda_a & ! prep_pay_a & ! beer_a & ! pay_a & ! select_a)) -> (next(soda_c) | next(soda_f) | next(select_c))"
      - "(select_c & (beer_a & ! soda_a & ! prep_pay_a & ! pay_a & ! select_a)) -> (next(beer_f) | next(beer_c) | next(select_c))"
      - "(prep_pay_c & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(prep_pay_c)"
      - "(prep_pay_f & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(prep_pay_f)"
      - "(pay_c & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(pay_c)"
      - "(pay_f & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(pay_f)"
      - "(select_c & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(select_c)"
      - "(select_f & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(select_f)"
      - "(soda_c & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(soda_c)"
      - "(soda_f & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(soda_f)"
      - "(beer_c & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(beer_c)"
      - "(beer_f & (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a)) -> next(beer_f)"
      - "(! prep_pay_c & ! prep_pay_a) -> next(! prep_pay_c)"
      - "(! prep_pay_f & ! prep_pay_a) -> next(! prep_pay_f)"
      - "(! pay_c & ! pay_a) -> next(! pay_c)"
      - "(! pay_f & ! pay_a) -> next(! pay_f)"
      - "(! select_c & ! select_a) -> next(! select_c)"
      - "(! select_f & ! select_a) -> next(! select_f)"
      - "(! soda_c & ! soda_a) -> next(! soda_c)"
      - "(! soda_f & ! soda_a) -> next(! soda_f)"
      - "(! beer_c & ! beer_a) -> next(! beer_c)"
      - "(! beer_f & ! beer_a) -> next(! beer_f)"
      - "next(prep_pay_c) -> next(! prep_pay_f)"
      - "next(prep_pay_f) -> next(! prep_pay_c)"
      - "next(pay_c) -> next(! pay_f)"
      - "next(pay_f) -> next(! pay_c)"
      - "next(select_c) -> next(! select_f)"
      - "next(select_f) -> next(! select_c)"
      - "next(soda_c) -> next(! soda_f)"
      - "next(soda_f) -> next(! soda_c)"
      - "next(beer_c) -> next(! beer_f)"
      - "next(beer_f) -> next(! beer_c)"

    SYS_LIVENESS:
      - "(finished | failed)"

    ENV_LIVENESS:
      - "((((prep_pay_a & ! soda_a & ! beer_a & ! pay_a & ! select_a) & (next(prep_pay_c) | next(prep_pay_f))) | ((pay_a & ! soda_a & ! prep_pay_a & ! beer_a & ! select_a) & (next(pay_c) | next(pay_f))) | ((select_a & ! soda_a & ! prep_pay_a & ! beer_a & ! pay_a) & (next(select_c) | next(select_f))) | ((soda_a & ! prep_pay_a & ! beer_a & ! pay_a & ! select_a) & (next(soda_c) | next(soda_f))) | ((beer_a & ! soda_a & ! prep_pay_a & ! pay_a & ! select_a) & (next(beer_c) | next(beer_f)))) | (! prep_pay_a & ! pay_a & ! select_a & ! soda_a & ! beer_a))"
