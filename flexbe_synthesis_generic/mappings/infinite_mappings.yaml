# Mappings used to standardize names
sm_outcome_mappings: {}
    # No outcomes of the state machine
    # Assume we run forever
    #
    #
    #
state_outcome_mappings:
    # --- Successes ---
    done: completed
    finished: completed
    received: completed
    'true': completed
    ###################
    # --- Failures  ---
    aborted: failure
    canceled: failure
    data_error: failure
    empty: failure
    failed: failure
    'false': failure
    no_connection: failure
    param_error: failure
    timeout: failure
    unavailable: failure
transition_outcomes:
    # Allowable transitions
    # These should have unique first characters for tagging (e.g. _f, _c)
    - completed
    - failure
