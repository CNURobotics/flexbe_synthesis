name: Feature Request
description: Suggest a capability, workflow improvement, or release-readiness task.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow, integration, or user need would this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, package, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: validation
    attributes:
      label: Validation ideas
      description: Tests, demos, or examples that should pass when this is complete.
